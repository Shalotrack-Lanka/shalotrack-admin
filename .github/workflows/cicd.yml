name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/shalotrack-admin:latest \
                       -t ${{ secrets.ACR_LOGIN_SERVER }}/shalotrack-admin:${{ github.sha }} \
                       --build-arg APP_KEY=${{ secrets.APP_KEY }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/shalotrack-admin:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/shalotrack-admin:${{ github.sha }}